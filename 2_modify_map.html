<!-- 
    Assignment 2: Modify a leaflet web map
    In this assignment you will start with a working web map, and then modify and add to it.

    Task:

    1. Replace the tile layer with a different one.
    hint: use the Leaflet Providers page to find one: https://leaflet-extras.github.io/leaflet-providers/preview/
    2. Add new markers to the map at three of your favorite locations around Duluth.
    - Each marker should have a popup that includes the name of the location and a fun fact about it.
    - At least one of the markers should have an image or video in the popup.
    - You can remove the existing marker for the UMD campus if you want.
    3. Center the map on Duluth (change the zoom level as well if you want).
    4. Modify the title and subtitle to reflect your name and the theme of your map.
    5. Add a paragraph to the paragraph describing your map and the locations you added.
    6. Modify the style of each of the elements (header, paragraph, and map) to your liking.
    - At a minimum, remove the inline style on the map div and add your own CSS to the style tag in the head of the document.
    - Make the map more prominent on the page by increasing its size and/or changing its position.

    AI use: you can ask questions of AI (such as "explain what this line of code does" or "how do I create a popup in Leaflet?") 
    But try and write the code yourself. 
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Most Basic Web Map</title>
    
    <!-- Leaflet CSS stylesheet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
}

.header {
    background-color: Black;
    color: white;
    text-align: center;
    padding: 20px;
}

.header h1 {
    margin-bottom: 5px;
}

.header h3 {
    margin-top: 0;
    font-weight: normal;
}

p {
    width: 80%;
    margin: 15px auto;
    text-align: left;
    font-size: 18px;
    line-height: 1.5;
    color: #333;
}

#map {
    width: 90%;
    height: 600px;
    margin: 20px auto;
    border: 4px solid #1d3557;
    border-radius: 12px;
    box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.3);
}      
    </style>
</head>
<body>
    <!-- Header at the top of the page -->
    
</head>
<body>
    <!-- Header at the top of the page -->
    <div class="header">
        <h1>A Basic Web Map Of Duluth</h1>
        <h3>by: Brandon Everett</h3>
    </div>
    <div id="map"></div>
    
    <!-- Leaflet JavaScript library -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // Initialize the map, center it on UMD campus, and set the zoom level, adjusted zoom level and setview
        const map = L.map('map').setView([46.1, -92.1], 11);

        // Add Esri Satellite tiles, changed the basemap to a dark theme 
        const tiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
        subdomains: 'abcd',
        maxZoom: 20
        });
        // add tiles to the map
        tiles.addTo(map);

        // add marker at Hartley Nature Center
        const hartleyMarker = L.marker([46.835, -92.089]).addTo(map);
        hartleyMarker.bindPopup("<b>Hartley Nature Center</b><br>A great place to hike and see wildlife!").openPopup();

        // added another marker for canal park
        const canalParkMarker = L.marker([46.7809, -92.0966]).addTo(map);
        canalParkMarker.bindPopup("<b>Canal Park</b><br>You can often watch huge ships pass under the Aerial Lift Bridge.");

        // Add a marker for the UMD campus
        const UMDcampusMarker = L.marker([46.82, -92.085]).addTo(map);
        UMDcampusMarker.bindPopup("<b>University of Minnesota Duluth</b><br>A great place to learn about GIS!").openPopup();

        //add a marker for enger tower
        const EngerTowerMarker = L.marker([46.7765, -92.1230 ]).addTo(map);
        EngerTowerMarker.bindPopup("<b>Enger Tower</b><br>one of the best panoramic views of Duluth, the harbor,  and Lake Superior.");
       
        //add a marker for lester park
        const lesterParkMarker = L.marker([46.8498, -91.9935]).addTo(map);
        lesterParkMarker.bindPopup(`<b>Lester Park</b><br>Lester Park has hiking and biking trails, waterfalls, and a great cliff jumping spot if youre feeling risky `);

    </script>
    <p>This web map shows a few examples of sightseeing around Duluth. 
        Many of these locations are accessible year-round and provide entertainemnt for locals and vistors.</p>
</body>
</html>
